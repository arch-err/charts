replicaCount: 1

image:
  repository: ghcr.io/advplyr/audiobookshelf
  pullPolicy: IfNotPresent
  tag: ""  # defaults to .Chart.AppVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

# Persistence — three PVCs (config/metadata/audiobooks)
persistence:
  config:
    enabled: true
    size: 1Gi
    storageClass: ""  # falls back to cluster default (kadalu.replica2)
    accessMode: ReadWriteOnce
  metadata:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  audiobooks:
    enabled: true
    size: 100Gi
    storageClass: ""
    accessMode: ReadWriteOnce

# Container env vars
env:
  TZ: UTC
  PORT: "80"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
