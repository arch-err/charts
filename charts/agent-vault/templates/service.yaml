apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-vault.fullname" . }}
  labels:
    {{- include "agent-vault.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: ui
      port: {{ .Values.service.uiPort }}
      targetPort: ui
      protocol: TCP
    - name: proxy
      port: {{ .Values.service.proxyPort }}
      targetPort: proxy
      protocol: TCP
  selector:
    {{- include "agent-vault.selectorLabels" . | nindent 4 }}
